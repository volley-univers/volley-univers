<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Volley Quiz</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo"><span class="ball"></span> Volley Quiz</a>
      <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="quiz.html">Quiz</a>
        <a href="leaderboard.html">Classement</a>
        <a href="secret.html" data-secret-link style="display:none">✦ Secrets</a>
      </nav>
      <div class="user-zone" data-user-zone></div>
      <button class="icon-btn" data-toggle-theme aria-label="Changer de thème">☾</button>
    </div>
  </header>

  <!-- ============== ZONE AUTH ============== -->
  <main class="auth-wrap">
    <div class="auth-box">
      <h1 id="auth-title">Bienvenue</h1>
      <p class="sub" id="auth-sub">Connecte-toi pour conserver ta progression et débloquer les secrets.</p>

      <!-- Onglets connexion / inscription -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Connexion</button>
        <button class="auth-tab" data-tab="register">Inscription</button>
      </div>

      <!-- FORM CONNEXION -->
      <form id="form-login" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="login-pwd">Mot de passe</label>
          <input type="password" id="login-pwd" autocomplete="current-password" />
        </div>
        <div class="form-error" id="login-err"></div>
        <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
      </form>

      <!-- FORM INSCRIPTION -->
      <form id="form-register" style="display:none" novalidate>
        <div class="form-group">
          <label for="reg-pseudo">Pseudo</label>
          <input type="text" id="reg-pseudo" autocomplete="username" maxlength="20" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="reg-pwd">Mot de passe (6 caractères min.)</label>
          <input type="password" id="reg-pwd" autocomplete="new-password" />
        </div>
        <div class="form-error" id="reg-err"></div>
        <button type="submit" class="btn btn-accent btn-full">Créer mon compte</button>
      </form>

      <p style="margin-top:18px;font-size:0.85rem;color:var(--text-soft);text-align:center;">
        Pas envie de t'inscrire ? <a href="quiz.html" style="color:var(--accent);font-weight:600;">Joue en mode invité</a>
      </p>
    </div>
  </main>

  <!-- SCRIPTS -->
  <script type="module">
    import { initTheme, initHeader, toast } from "./js/ui.js";
    import {
      inscrire, connecter, validerInscription, validerConnexion,
      observerAuth
    } from "./js/auth.js";
    import { initKonami, rafraichirMenuSecrets } from "./js/easteregg.js";

    initTheme();
    initHeader();
    initKonami();
    rafraichirMenuSecrets();

    // Si déjà connecté, rediriger vers l'accueil
    observerAuth((user) => {
      if (user) {
        toast(`Déjà connecté en tant que ${user.displayName || "joueur"}`, "info");
        setTimeout(() => location.href = "index.html", 1000);
      }
    });

    // Switch onglets
    const tabs = document.querySelectorAll(".auth-tab");
    const formLogin = document.getElementById("form-login");
    const formReg = document.getElementById("form-register");
    const title = document.getElementById("auth-title");
    const sub = document.getElementById("auth-sub");

    tabs.forEach((t) => {
      t.addEventListener("click", () => {
        tabs.forEach((x) => x.classList.remove("active"));
        t.classList.add("active");
        if (t.dataset.tab === "login") {
          formLogin.style.display = "";
          formReg.style.display = "none";
          title.textContent = "Bienvenue";
          sub.textContent = "Connecte-toi pour conserver ta progression et débloquer les secrets.";
        } else {
          formLogin.style.display = "none";
          formReg.style.display = "";
          title.textContent = "Rejoindre le terrain";
          sub.textContent = "Un pseudo, un email, un mot de passe : c'est parti.";
        }
      });
    });

    // SUBMIT CONNEXION
    formLogin.addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("login-err");
      errEl.textContent = "";

      const data = {
        email: document.getElementById("login-email").value.trim(),
        motDePasse: document.getElementById("login-pwd").value
      };
      const erreur = validerConnexion(data);
      if (erreur) { errEl.textContent = erreur; return; }

      const btn = formLogin.querySelector("button[type=submit]");
      btn.disabled = true; btn.textContent = "Connexion…";
      try {
        const user = await connecter(data);
        toast(`Bon retour, ${user.displayName || "joueur"} !`, "success");
        setTimeout(() => location.href = "index.html", 600);
      } catch (err) {
        errEl.textContent = err.message;
        btn.disabled = false; btn.textContent = "Se connecter";
      }
    });

    // SUBMIT INSCRIPTION
    formReg.addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("reg-err");
      errEl.textContent = "";

      const data = {
        pseudo: document.getElementById("reg-pseudo").value.trim(),
        email: document.getElementById("reg-email").value.trim(),
        motDePasse: document.getElementById("reg-pwd").value
      };
      const erreur = validerInscription(data);
      if (erreur) { errEl.textContent = erreur; return; }

      const btn = formReg.querySelector("button[type=submit]");
      btn.disabled = true; btn.textContent = "Création…";
      try {
        const user = await inscrire(data);
        toast(`Compte créé ! Bienvenue ${user.displayName}`, "success");
        setTimeout(() => location.href = "index.html", 800);
      } catch (err) {
        errEl.textContent = err.message;
        btn.disabled = false; btn.textContent = "Créer mon compte";
      }
    });
  </script>
</body>
</html>
